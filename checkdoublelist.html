<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1400" />
  <title>Entry List - Doubles - Master, Hope & Kids 2026 C.2</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, "Sarabun", sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #002f6c, #0074d9);
      color: white;
      text-align: center;
      padding: 30px 16px;
    }

    header .main-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0;
    }

    header .type-title {
      font-size: 24px;
      margin: 8px 0 0;
      color: #eaf4ff;
    }

    header .event-title {
      font-size: 20px;
      margin: 8px 0 0;
      font-weight: 400;
      color: #d9ecff;
    }

    .container {
      width: 1250px;
      margin: 24px auto;
    }

    .filters {
      background: white;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 120px;
      gap: 12px;
      margin-bottom: 18px;
    }

    input, select, button {
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }

    button {
      background: #005bbb;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #004799;
    }

    .summary {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1250px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: #003b7a;
      color: white;
      cursor: pointer;
    }

    th:hover {
      background: #005bbb;
    }

    tr:hover {
      background: #f1f7ff;
    }

    .loading {
      text-align: center;
      padding: 30px;
      font-size: 18px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

<header>
  <h1 class="main-title">ENTRY LIST</h1>
  <div class="type-title">Doubles</div>
  <div class="event-title">Master, Hope & Kids 2026 C.2</div>
</header>

<div class="container">

  <div class="filters">
    <input type="text" id="nameSearch" placeholder="Search Player Name" />
    <input type="text" id="codeSearch" placeholder="Search Player Code" />
    <input type="text" id="teamSearch" placeholder="Search Team" />

    <select id="eventFilter">
      <option value="">All Event</option>
    </select>

    <button onclick="resetFilters()">Reset</button>
  </div>

  <div class="summary" id="summary"></div>
  <div id="tableArea" class="loading">กำลังโหลดข้อมูล...</div>

</div>

<script>
  const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQi_qkPOXaVMpbXAaGdqv_tpbndqFS425pWQ9IXlD2LY0WBc3o5nQ13yT-_sfFXs9Xy8mh-O2CuVst/pub?gid=179209219&single=true&output=csv";

  const columns = [
    "Event",
    "Team",
    "Code1",
    "Name1",
    "Rank1",
    "Point1",
    "Age1",
    "Code2",
    "Name2",
    "Rank2",
    "Point2",
    "Age2",
    "Total"
  ];

  let allData = [];
  let filteredData = [];
  let sortDirection = {};

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,

    complete: function(results) {
      allData = results.data;
      filteredData = [...allData];

      buildDropdown("Event", "eventFilter");
      renderTable(filteredData);
    },

    error: function() {
      document.getElementById("tableArea").innerHTML =
        "โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบลิงก์ Google Sheet";
    }
  });

  function buildDropdown(column, elementId) {
    const select = document.getElementById(elementId);

    const values = [
      ...new Set(
        allData
          .map(row => row[column])
          .filter(value => value !== undefined && value !== null && value !== "")
      )
    ];

    values.sort(sortEnglishThenThai);

    values.forEach(value => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
  }

  function applyFilters() {
    const nameText = document.getElementById("nameSearch").value.toLowerCase();
    const codeText = document.getElementById("codeSearch").value.toLowerCase();
    const teamText = document.getElementById("teamSearch").value.toLowerCase();
    const eventValue = document.getElementById("eventFilter").value;

    filteredData = allData.filter(row => {
      const name1 = String(row.Name1 || "").toLowerCase();
      const name2 = String(row.Name2 || "").toLowerCase();

      const code1 = String(row.Code1 || "").toLowerCase();
      const code2 = String(row.Code2 || "").toLowerCase();

      const team = String(row.Team || "").toLowerCase();
      const event = String(row.Event || "");

      return (
        (name1.includes(nameText) || name2.includes(nameText)) &&
        (code1.includes(codeText) || code2.includes(codeText)) &&
        team.includes(teamText) &&
        (eventValue === "" || event === eventValue)
      );
    });

    renderTable(filteredData);
  }

  function sortEnglishThenThai(a, b) {
    const textA = String(a || "").trim();
    const textB = String(b || "").trim();

    const isEnglishA = /^[A-Za-z]/.test(textA);
    const isEnglishB = /^[A-Za-z]/.test(textB);

    if (isEnglishA && !isEnglishB) return -1;
    if (!isEnglishA && isEnglishB) return 1;

    return textA.localeCompare(textB, ["en", "th"], {
      sensitivity: "base"
    });
  }

  function sortColumn(column) {
    sortDirection[column] = !sortDirection[column];
    const direction = sortDirection[column] ? 1 : -1;

    const numberColumns = [
      "Rank1",
      "Point1",
      "Age1",
      "Rank2",
      "Point2",
      "Age2",
      "Total"
    ];

    filteredData.sort((a, b) => {
      if (numberColumns.includes(column)) {
        const numA = parseFloat(a[column]) || 0;
        const numB = parseFloat(b[column]) || 0;
        return (numA - numB) * direction;
      }

      return sortEnglishThenThai(a[column], b[column]) * direction;
    });

    renderTable(filteredData);
  }

  function resetFilters() {
    document.getElementById("nameSearch").value = "";
    document.getElementById("codeSearch").value = "";
    document.getElementById("teamSearch").value = "";
    document.getElementById("eventFilter").value = "";

    filteredData = [...allData];
    renderTable(filteredData);
  }

  function renderTable(data) {
    document.getElementById("summary").textContent =
      `Total Entries : ${data.length} Pairs`;

    if (data.length === 0) {
      document.getElementById("tableArea").innerHTML =
        "<div class='loading'>ไม่พบข้อมูล</div>";
      return;
    }

    let html = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
    `;

    columns.forEach(col => {
      html += `<th onclick="sortColumn('${col}')">${col}</th>`;
    });

    html += `
            </tr>
          </thead>
          <tbody>
    `;

    data.forEach(row => {
      html += "<tr>";
      columns.forEach(col => {
        html += `<td>${row[col] || ""}</td>`;
      });
      html += "</tr>";
    });

    html += `
          </tbody>
        </table>
      </div>
    `;

    document.getElementById("tableArea").innerHTML = html;
  }

  document.getElementById("nameSearch").addEventListener("input", applyFilters);
  document.getElementById("codeSearch").addEventListener("input", applyFilters);
  document.getElementById("teamSearch").addEventListener("input", applyFilters);
  document.getElementById("eventFilter").addEventListener("change", applyFilters);
</script>

</body>
</html>
