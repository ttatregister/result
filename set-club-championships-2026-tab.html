<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SET Table Tennis Club Championships 2026</title>
<meta name="viewport" content="width=1280">

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  min-width:1280px;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
}

body{
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  background:#003366;
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* TAB MENU */
.tab-menu{
  display:flex;
  justify-content:center;
  gap:10px;
  background:#e6eef8;
  padding:15px;
}

.tab-btn{
  padding:12px 20px;
  border:none;
  background:#0066cc;
  color:#fff;
  font-size:15px;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.tab-btn:hover{
  background:#004d99;
}

.tab-btn.active{
  background:#003366;
}

/* CONTENT */
.content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:stretch;
}

iframe{
  width:100%;
  height:100%;
  max-width:1400px;
  border:none;
  background:#fff;
}
</style>
</head>

<body>

<header>
SET Table Tennis Club Championships 2026
</header>

<!-- TAB BUTTON -->
<div class="tab-menu">

<button class="tab-btn active" onclick="changeTab(this, 'u9')">
ทีมทั่วไป / U9–11
</button>

<button class="tab-btn" onclick="changeTab(this, 'senior')">
ทีมอาวุโส
</button>

<button class="tab-btn" onclick="changeTab(this, 'youth')">
เยาวชน U13–19
</button>

</div>

<!-- RESULT FRAME -->
<div class="content">

<iframe id="resultFrame"
src="https://1drv.ms/x/c/f6e31c8d11f28b7e/IQTuSDElcYnYQ4wZiUMQTHimAYgB1OLcTfZ-apVRVJMlLo8?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True">
</iframe>

</div>

<script>
function changeTab(button, type){

  // ลบ active ทุกปุ่ม
  let buttons = document.querySelectorAll(".tab-btn");
  buttons.forEach(btn => btn.classList.remove("active"));

  // ใส่ active ปุ่มที่กด
  button.classList.add("active");

  let frame = document.getElementById("resultFrame");

  if(type === "u9"){
    frame.src = "https://1drv.ms/x/c/f6e31c8d11f28b7e/IQTuSDElcYnYQ4wZiUMQTHimAYgB1OLcTfZ-apVRVJMlLo8?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True";
  }

  if(type === "senior"){
    frame.src = "https://1drv.ms/x/c/f6e31c8d11f28b7e/IQQUfNbwCzDXSqBYMH77BRkCAfokOn4rxqnAX17zmcnzh7s?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True";
  }

  if(type === "youth"){
    frame.src = "https://1drv.ms/x/c/f6e31c8d11f28b7e/IQRSZnX25JnvT7DLjVDhPCDTAWxSR5_J3lvi_mHC6K9aHNw?em=2&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True";
  }

}
</script>

</body>
</html>
